name: Go Test

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-test.yml"

permissions: {}

concurrency:
  group: go-test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...
