name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "リリースタグ（例 v0.1.0）"
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      # cgo（mattn/go-sqlite3）を有効化したネイティブビルド。
      # クロスコンパイルはせず、各 runner で実行アーキテクチャ向けにビルドする。
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -tags sqlite_fts5 -trimpath -o rss-reader .

      - name: Package
        run: |
          ARCHIVE_NAME="rss-reader-${{ inputs.tag }}-${{ matrix.target }}"
          STAGING_DIR="${ARCHIVE_NAME}"
          mkdir "${STAGING_DIR}"

          cp "rss-reader" "${STAGING_DIR}/"

          if [ -f README.md ]; then
            cp README.md "${STAGING_DIR}/"
          fi

          if [ -f feeds.opml ]; then
            cp feeds.opml "${STAGING_DIR}/"
          fi

          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING_DIR}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/rss-reader-${{ inputs.tag }}-aarch64-apple-darwin.tar.gz
            artifacts/rss-reader-${{ inputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
