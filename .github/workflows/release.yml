name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "リリースタグ（例 v0.1.0）"
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M系) のみ。macOS の cgo バイナリは
          # システムライブラリへ動的リンクするのが標準。
          - name: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            cc: clang
            ldflags: ""
          # cgo(go-sqlite3) を musl で完全静的リンクし、
          # glibc バージョン依存を排除して配布可搬性を確保する。
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: musl-gcc
            ldflags: "-linkmode external -extldflags -static"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install musl toolchain
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # cgo（mattn/go-sqlite3）を有効化したネイティブビルド。
      # クロスコンパイルはせず、各 runner で実行アーキテクチャ向けにビルドする。
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: go build -tags sqlite_fts5 -trimpath -ldflags "${{ matrix.ldflags }}" -o rss-reader .

      - name: Package
        run: |
          ARCHIVE_NAME="rss-reader-${{ inputs.tag }}-${{ matrix.name }}"
          STAGING_DIR="${ARCHIVE_NAME}"
          mkdir "${STAGING_DIR}"

          cp "rss-reader" "${STAGING_DIR}/"

          if [ -f README.md ]; then
            cp README.md "${STAGING_DIR}/"
          fi

          if [ -f feeds.opml ]; then
            cp feeds.opml "${STAGING_DIR}/"
          fi

          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING_DIR}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.name }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/rss-reader-${{ inputs.tag }}-darwin-arm64.tar.gz
            artifacts/rss-reader-${{ inputs.tag }}-linux-amd64.tar.gz
            artifacts/SHA256SUMS
