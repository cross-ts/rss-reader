name: Release

on:
  push:
    branches: [main]
    paths:
      - "*.go"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "feeds.opml"
  workflow_dispatch:
    inputs:
      tag:
        description: "リリースタグ（例 v0.1.0）"
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
            if [ -z "${LATEST}" ]; then
              echo "tag=v0.1.0" >> "${GITHUB_OUTPUT}"
            else
              MAJOR=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f2)
              PATCH=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f3)
              PATCH=$((PATCH + 1))
              echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "${GITHUB_OUTPUT}"
            fi
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
          - name: linux-amd64
            goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o rss-reader .

      - name: Package
        run: |
          ARCHIVE_NAME="rss-reader-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.name }}"
          STAGING_DIR="${ARCHIVE_NAME}"
          mkdir "${STAGING_DIR}"

          cp "rss-reader" "${STAGING_DIR}/"

          if [ -f README.md ]; then
            cp README.md "${STAGING_DIR}/"
          fi

          if [ -f feeds.opml ]; then
            cp feeds.opml "${STAGING_DIR}/"
          fi

          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING_DIR}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-${{ matrix.name }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/rss-reader-${{ needs.resolve-tag.outputs.tag }}-darwin-arm64.tar.gz
            artifacts/rss-reader-${{ needs.resolve-tag.outputs.tag }}-linux-amd64.tar.gz
            artifacts/SHA256SUMS
